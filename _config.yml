title: "WhiteL Dragon"
description: "Всё что осталось от страницы ВКонтакте — личный архив Whitel Dragon"
url: https://whiteldragon.github.io
baseurl: ""
lang: ru
locale: ru_RU

author:
  name: Whitel Dragon
  url: https://t.me/WhliD

ga4: "G-3L672NMKB9"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

exclude:
  - vendor
  - .bundle
  - _site_probe
  - _site_build_probe
  - _site_sitemap_test
  - _site_ruby_probe
  - _site_ruby_process_probe
  - _site_ruby_process_probe2

# Open Graph / соцсети
social:
  name: Whitel Dragon
  links:
    - https://t.me/WhliD

# SEO: заголовок в поиске будет "Название поста | Мой архив ВКонтакте"
tagline: "Всё что осталось от страницы ВКонтакте"

# Мета-теги по умолчанию для постов и страниц
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Whitel Dragon
      lang: ru
      sitemap: true
  - scope:
      path: ""
      type: "pages"
    values:
      author: Whitel Dragon
      lang: ru
      sitemap: true
  - scope:
      path: "assets"
    values:
      sitemap: false
  - scope:
      path: "google6b56eb206c057dd4.html"
    values:
      sitemap: false
  - scope:
      path: "search.json"
    values:
      sitemap: false
  - scope:
      path: "search.html"
    values:
      sitemap: false
  - scope:
      path: "photos.json"
    values:
      sitemap: false
  - scope:
      path: "archive.html"
    values:
      sitemap: false
  - scope:
      path: "a108c9e675e04e9ba60801ccf336bb78.txt"
    values:
      sitemap: false
  - scope:
      path: "tools/post-studio.html"
    values:
      sitemap: false
