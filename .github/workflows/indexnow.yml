name: IndexNow - notify on deploy

on:
  workflow_run:
    workflows: ["Build & Deploy (Jekyll + Pagefind)"]
    types: [completed]
  workflow_dispatch:

jobs:
  indexnow:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Submit URLs to IndexNow
        run: |
          cat <<'ENDOFSCRIPT' | node
          const https = require('https');

          const KEY = 'a108c9e675e04e9ba60801ccf336bb78';
          const HOST = 'whiteldragon.github.io';
          const SITEMAP_URL = 'https://' + HOST + '/sitemap.xml';
          const INDEXNOW_ENDPOINT = 'https://api.indexnow.org/IndexNow';

          function fetchUrl(url) {
            return new Promise((resolve, reject) => {
              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(data));
                res.on('error', reject);
              }).on('error', reject);
            });
          }

          function postJson(endpoint, payload) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify(payload);
              const url = new URL(endpoint);
              const options = {
                hostname: url.hostname,
                path: url.pathname,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json; charset=utf-8',
                  'Content-Length': Buffer.byteLength(body),
                },
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve({ status: res.statusCode, body: data }));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
          }

          async function main() {
            console.log('Fetching sitemap:', SITEMAP_URL);
            const xml = await fetchUrl(SITEMAP_URL);

            const allUrls = [];
            const re = /<loc>(https?:\/\/[^<]+)<\/loc>/g;
            let m;
            while ((m = re.exec(xml)) !== null) {
              allUrls.push(m[1].trim());
            }
            console.log('Found ' + allUrls.length + ' URLs in sitemap');

            const postUrls = allUrls.filter(url => {
              if (!/\/\d{4}\/\d{2}\/\d{2}\/[^/]+\.html$/.test(url)) return false;
              if (url.includes('/comments/') || url.includes('?comments')) return false;
              return true;
            });

            console.log('Filtered to ' + postUrls.length + ' post URLs');

            if (postUrls.length === 0) {
              console.log('No post URLs found, exiting.');
              process.exit(0);
            }

            const BATCH_SIZE = 100;
            let submitted = 0;

            for (let i = 0; i < postUrls.length; i += BATCH_SIZE) {
              const batch = postUrls.slice(i, i + BATCH_SIZE);
              const payload = {
                host: HOST,
                key: KEY,
                keyLocation: 'https://' + HOST + '/' + KEY + '.txt',
                urlList: batch,
              };

              console.log('Sending batch ' + (Math.floor(i/BATCH_SIZE)+1) + ': URLs ' + (i+1) + '-' + (i+batch.length));
              const result = await postJson(INDEXNOW_ENDPOINT, payload);
              console.log('  Response: ' + result.status + ' ' + result.body);

              submitted += batch.length;

              if (i + BATCH_SIZE < postUrls.length) {
                await sleep(2000);
              }
            }

            console.log('Done. Submitted ' + submitted + ' URLs to IndexNow.');
          }

          main().catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          ENDOFSCRIPT
